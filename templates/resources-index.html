{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
</section>

<section class="resource-index">
  <div class="resource-grid">
    {% for db in page.databases %}
    <a class="resource-card" href="{{ db.href }}">
      <span class="resource-abbr">{{ db.abbr }}</span>
      <h2 class="resource-name">{{ db.name }}</h2>
      <p class="resource-blurb">{{ db.blurb }}</p>
      <span class="resource-cta">Learn more
        <svg viewBox="0 -960 960 960" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg>
      </span>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
