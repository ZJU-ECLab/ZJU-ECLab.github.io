name: Deploy site

# Build the static site with build.py and publish dist/ to GitHub Pages.
# Triggers on any push to main (including data/ updates pushed by the
# ECLab-News pipeline, so new journal issues go live automatically).
on:
  push:
    branches: [main]
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

# Pages deployment permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run so a
# data push mid-deploy still completes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build site
        # Use the pinned flake toolchain so CI matches local builds exactly.
        run: nix develop --command python3 build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
