          Zen practitioner and have a deep appreciation for Confucian and
          Buddhist philosophical theories.
      - name_en: Qi Peng
        name_zh: 彭琦
        role: Ph.D candidate, 2025
        email: 17861131672@163.com
        photo: /assets/img/people/qi-peng.png
        bio: >-
          I'm a Ph.D. student researching cultural differences in emotional
          expression. I have a Master's in Applied Psychology from Tianjin
          University of Traditional Chinese Medicine. Outside of academics, I
