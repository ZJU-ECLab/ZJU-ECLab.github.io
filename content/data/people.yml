    members:
      - name_en: Zhihe Pan
        name_zh: 潘之禾
        role: Ph.D candidate, 2022
        email: zhpan@zju.edu.cn
        photo: /assets/img/people/zhihe-pan.png
        bio: >-
          I'm a PhD student in Psychology at Zhejiang University. My research
          interest lies in vocal and facial communication of emotions, as well
          as the cultural and linguistic differences involved in these
          processes. I'm passionate about music—in my free time, I enjoy playing
          the double bass and piano, and singing.
      - name_en: Shutong Liu
        name_zh: 刘书彤
        role: Ph.D candidate, 2022
        email: lsto@zju.edu.cn
        photo: /assets/img/people/shutong-liu.png
        bio: >-
          I'm a PhD student in the Department of Psychology at Zhejiang
          University. I obtained a bachelor's degree in Industrial Design at
          Tongji University. During the user-oriented design process, I gradually
          realized the importance of understanding human, so I turned to studying
          psychology. My current interest is the mechanism and ability of human
          emotion perception. Hope our research can help people live a better
          life～
      - name_en: Ziyu Zhang
        name_zh: 张子玉
        role: Ph.D candidate, 2024
        email: ziyuzhang.psy@outlook.com
