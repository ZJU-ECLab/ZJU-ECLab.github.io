      - name_en: Yong Zhuang
        name_zh: 庄湧
        role: Ph.D candidate, 2025
        email: yfdice@gmail.com
        photo: /assets/img/people/yong-zhuang.png
        bio: >-
          I'm Zhuang Yong, a part-time Ph.D. student. I graduated from Zhejiang
          University in 2003 with a degree in Computer Science. Having spent more
          than 20 years at Kingsoft Office, I'm now combining my software
          background with psychology to build a more versatile system for
          recognizing human emotions and behaviors.

