# Lab members — edit this file to update the People page.
# `photo` currently points at the live WordPress image; Phase 5 migrates these
# into /assets/img/people/ and rewrites the paths. Groups render in the order
# listed under `groups`.

groups:
  - id: pi
    label: Principal Investigator
    members:
      - name_en: Xia Fang
        name_zh: 方霞
        role: Principal Investigator
        email: x.fang@zju.edu.cn
        cv: /assets/files/cv/fang-cv-2025.pdf
        photo: /assets/img/people/xia-fang.jpg
        bio: >-
          I'm an Assistant Professor of Psychology and Behavioral Sciences at
          Zhejiang University, with a passion for understanding how we express
          and perceive emotions, and how culture shapes these processes. I
          earned my Ph.D. in Social Psychology from the University of Amsterdam.
          Outside the lab, you'll find me enjoying coffee, nurturing plants,
          exploring art, and embracing the outdoors—always inspired by the
          connections that bring people together.

  - id: phd
